name: nestkin
description: Nestkin - Task Assignment App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.3
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  googleapis_auth: ^1.4.1
  flutter_svg: ^2.2.4
  fl_chart: ^0.69.0
  geolocator: ^13.0.0
  google_maps_flutter: ^2.9.0
  geoflutterfire_plus: ^0.0.16
  flutter_quill: ^11.4.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  confetti: ^0.8.0
  table_calendar: ^3.1.2
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.3.1
  http: ^1.2.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  uuid: ^4.5.1
  vibration: ^2.0.0
  flutter_native_contact_picker: ^0.0.11
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_cloud_firestore: ^3.1.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
